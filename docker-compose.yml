services:

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: laravel_php

    working_dir: /var/www

    volumes:
      - ./:/var/www

    # Inside the container, the database is the `postgres` service (not 127.0.0.1).
    # These real env vars override the matching values in .env for the container only,
    # so host-based `php artisan serve` keeps using the .env settings.
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret

    depends_on:
      - postgres

  nginx:
    image: nginx:latest

    container_name: laravel_nginx

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php

  postgres:
    image: postgres:16

    container_name: laravel_postgres

    restart: always

    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
